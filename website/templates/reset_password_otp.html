<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Token | MMU OSSD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-field { transition: border-color 0.2s, box-shadow 0.2s; }
        .input-field:focus { box-shadow: 0 0 0 3px rgba(220,38,38,0.12); }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .card { animation: fadeUp 0.4s ease both; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-red-50 flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="/" class="inline-block">
                <h1 class="text-4xl font-extrabold tracking-tight text-gray-900">MMU <span class="font-light text-red-600">OSSD</span></h1>
            </a>
        </div>

        <div class="card bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <h2 class="text-2xl font-black text-gray-900 mb-1">Reset Password</h2>
            <p class="text-gray-400 text-sm mb-6">Enter the OTP sent to your email and your new password.</p>

            <div id="error-msg" class="hidden items-center gap-3 bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl mb-5">
                <i class="fas fa-circle-exclamation flex-shrink-0"></i>
                <span id="error-text"></span>
            </div>
            <div id="success-msg" class="hidden items-center gap-3 bg-green-50 border border-green-200 text-green-700 text-sm px-4 py-3 rounded-xl mb-5">
                <i class="fas fa-check-circle flex-shrink-0"></i>
                <span id="success-text"></span>
            </div>

            <form id="reset-otp-form" class="space-y-4" novalidate>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Verification Token (OTP)</label>
                    <input type="text" id="otp" required placeholder="Enter 6-digit OTP" class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">New Password</label>
                    <input type="password" id="new-password" required placeholder="••••••••" class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50">
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-all text-sm mt-2 flex items-center justify-center gap-2">
                    <span id="btn-label">Reset Password</span>
                    <i id="btn-spinner" class="fas fa-spinner fa-spin hidden"></i>
                </button>
            </form>
        </div>
    </div>
<script>
    // 这里包含向后端的 /api/verify_otp 发送验证的纯英文前端逻辑...
    document.getElementById('reset-otp-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const otpVal = document.getElementById('otp').value.trim();
        const passVal = document.getElementById('new-password').value;
        const btn = document.getElementById('submit-btn');
        
        if(!otpVal || !passVal) return;
        
        btn.disabled = true;
        try {
            const res = await fetch('/api/verify_reset_otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ otp: otpVal, password: passVal })
            });
            const data = await res.json();
            if(res.ok) {
                document.getElementById('success-msg').classList.remove('hidden');
                document.getElementById('success-text').textContent = "Password updated! Redirecting to login...";
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
                document.getElementById('error-text').textContent = data.error || "Verification failed.";
            }
        } catch { }
        btn.disabled = false;
    });
</script>
</body>
</html>
