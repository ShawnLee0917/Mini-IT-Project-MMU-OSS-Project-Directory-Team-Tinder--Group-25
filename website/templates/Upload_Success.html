<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Successful | MMU OSSD</title>
<!-- This is the Tailwind CSS that i used for the website. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!--https://cdnjs.com/ -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <style>

        /* This is get from Google Fonts. */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom animation for the success checkmark */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

                                :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
        }

        html[data-theme="dark"] {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --text-primary: #e5e7eb;
            --text-secondary: #a1a1a1;
            --border-color: #333333;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        html[data-theme="dark"] .border-gray-200 {
    border-color: var(--border-color) !important;
}
        /* Dark theme overrides */
        html[data-theme="dark"] body {
            background-color: var(--bg-secondary);
        }
        
        html[data-theme="dark"] header {
            background-color: var(--bg-primary) !important;
            border-color: var(--border-color) !important;
        }
        
        html[data-theme="dark"] header h2,
        html[data-theme="dark"] header p {
            color: var(--text-primary) !important;
        }
        
        html[data-theme="dark"] .bg-white {
            background-color: var(--bg-primary) !important;
            border-color: var(--border-color) !important;
        }
        
        html[data-theme="dark"] .bg-gray-50 {
            background-color: var(--bg-secondary) !important;
        }
        
        html[data-theme="dark"] .text-gray-900,
        html[data-theme="dark"] .text-gray-800 {
            color: var(--text-primary) !important;
        }
        
        html[data-theme="dark"] .text-gray-500,
        html[data-theme="dark"] .text-gray-600,
        html[data-theme="dark"] .text-gray-700 {
            color: var(--text-secondary) !important;
        }
        
        html[data-theme="dark"] .border-gray-200,
        html[data-theme="dark"] .border-gray-100 {
            border-color: var(--border-color) !important;
        }
        
        html[data-theme="dark"] .text-gray-400 {
            color: var(--text-secondary) !important;
        }
        
        html[data-theme="dark"] input,
        html[data-theme="dark"] textarea,
        html[data-theme="dark"] select {
            background-color: var(--bg-secondary) !important;
            color: var(--text-primary) !important;
            border-color: var(--border-color) !important;
        }
        
        html[data-theme="dark"] input:focus,
        html[data-theme="dark"] textarea:focus,
        html[data-theme="dark"] select:focus {
            background-color: var(--bg-primary) !important;
        }

        html[data-theme="dark"] .bg-gray-100 {
            background-color: #262626 !important;
        }

        html[data-theme="dark"] .hover\:bg-gray-200:hover {
            background-color: #333333 !important;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6 text-gray-900">

    <div class="bg-white rounded-3xl shadow-xl shadow-gray-200/50 border border-gray-100 max-w-md w-full p-10 text-center">
        
        <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 animate-pop-in">
            <i class="fas fa-check text-5xl text-green-500"></i>
        </div>

        <h2 class="text-3xl font-black text-gray-900 mb-3">Upload Successful!</h2>
        <p class="text-gray-500 font-medium mb-8 leading-relaxed">
            Your project details and screenshots have been securely saved to the database.
        </p>

        <div class="space-y-4">
            <a href="{{ url_for('views.my_projects') }}" class="block w-full bg-red-600 text-white px-6 py-4 rounded-2xl font-bold hover:bg-red-700 transform hover:-translate-y-1 transition shadow-lg shadow-red-200">
                View My Projects
            </a>
            
            <a href="{{ url_for('views.home') }}" class="block w-full bg-white text-gray-500 px-6 py-4 rounded-2xl font-bold hover:bg-gray-50 hover:text-gray-900 border-2 border-gray-100 transition">
                Return to Home
            </a>
        </div>

    </div>

    <script>
        const API = '/api';

           // ── Theme Toggle Functionality ────────────────────────────────────────────
    function initTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);
    }

    function setTheme(theme) {
        const html = document.documentElement;
        if (theme === 'dark') {
            html.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            updateThemeIcon('dark');
        } else {
            html.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            updateThemeIcon('light');
        }
    }

    function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme') || 'light';
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        setTheme(newTheme);
    }

    function updateThemeIcon(theme) {
        const desktopToggle = document.getElementById('theme-toggle');
        const mobileText = document.getElementById('theme-toggle-text');
        if (theme === 'dark') {
            if (desktopToggle) {
                desktopToggle.innerHTML = '<i class="fas fa-sun text-lg"></i>';
                desktopToggle.title = 'Toggle Light Mode';
            }
            if (mobileText) {
                mobileText.textContent = 'Light Mode';
            }
        } else {
            if (desktopToggle) {
                desktopToggle.innerHTML = '<i class="fas fa-moon text-lg"></i>';
                desktopToggle.title = 'Toggle Dark Mode';
            }
            if (mobileText) {
                mobileText.textContent = 'Dark Mode';
            }
        }
    }

    // Initialize theme on page load
    initTheme();

    // Attach event listener to desktop theme toggle
    const themeToggleBtn = document.getElementById('theme-toggle');
    if (themeToggleBtn) {
        themeToggleBtn.addEventListener('click', toggleTheme);
    }
    </script>

</body>
</html>
