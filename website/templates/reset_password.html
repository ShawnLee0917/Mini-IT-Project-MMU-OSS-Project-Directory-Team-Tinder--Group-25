<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | MMU OSSD</title>
    <meta name="description" content="Set a new password for your MMU OSSD account">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-field { transition: border-color 0.2s, box-shadow 0.2s; }
        .input-field:focus { box-shadow: 0 0 0 3px rgba(220,38,38,0.12); }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .card { animation: fadeUp 0.4s ease both; }

        /* Password strength bar */
        .strength-bar { height: 4px; border-radius: 9999px; transition: width 0.3s ease, background 0.3s ease; }

        /* OTP digit boxes */
        .otp-box {
            width: 48px; height: 56px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            font-family: monospace;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #f9fafb;
        }
        .otp-box:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
            background: #fff;
        }
        .otp-box.filled { border-color: #ef4444; background: #fff5f5; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-red-50 flex items-center justify-center px-4 py-8">

    <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <a href="/" class="inline-block">
                <h1 class="text-4xl font-extrabold tracking-tight text-gray-900">
                    MMU <span class="font-light text-red-600">OSSD</span>
                </h1>
            </a>
            <p class="text-gray-400 text-sm mt-2">Open Source Student Directory</p>
        </div>

        <div class="card bg-white p-8 rounded-3xl shadow-xl border border-gray-100">

            <!-- Progress steps -->
            <div class="flex items-center justify-center gap-3 mb-8">
                <div id="step1-indicator" class="flex items-center gap-1.5">
                    <div class="w-7 h-7 rounded-full bg-red-600 text-white text-xs font-bold flex items-center justify-center">1</div>
                    <span class="text-xs font-semibold text-red-600">Verify</span>
                </div>
                <div class="h-px w-8 bg-gray-200"></div>
                <div id="step2-indicator" class="flex items-center gap-1.5">
                    <div id="step2-num" class="w-7 h-7 rounded-full bg-gray-200 text-gray-500 text-xs font-bold flex items-center justify-center">2</div>
                    <span id="step2-label" class="text-xs font-semibold text-gray-400">New Password</span>
                </div>
            </div>

            <h2 class="text-2xl font-black text-gray-900 mb-1 text-center">Reset Password</h2>
            <p id="step-desc" class="text-gray-400 text-sm mb-6 text-center">Enter the 6-digit code sent to your email</p>

            <!-- Status message -->
            <div id="status-msg" class="hidden items-center gap-3 border text-sm px-4 py-3 rounded-xl mb-5">
                <i id="status-icon" class="fas"></i>
                <span id="status-text"></span>
            </div>

            <!-- ── STEP 1: OTP verification ───────────────────────────── -->
            <div id="step-otp">
                <div class="mb-5">
                    <label for="email" class="block text-sm font-bold text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="email" name="email" required
                        placeholder="student@mmu.edu.my"
                        class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50">
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-bold text-gray-700 mb-3">Reset Code</label>
                    <div class="flex gap-2 justify-center" id="otp-inputs">
                        <input type="text" maxlength="1" class="otp-box" data-idx="0" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-box" data-idx="1" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-box" data-idx="2" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-box" data-idx="3" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-box" data-idx="4" inputmode="numeric">
                        <input type="text" maxlength="1" class="otp-box" data-idx="5" inputmode="numeric">
                    </div>
                    <p class="text-xs text-blue-600 bg-blue-50 border border-blue-200 rounded-lg p-2.5 mt-3">
                        <i class="fas fa-terminal mr-1.5"></i>
                        <strong>Dev Mode:</strong> Check the terminal where Flask is running for the code.
                    </p>
                </div>

                <!-- Dev-only: show OTP button -->
                <button type="button" id="show-otp-btn"
                    class="w-full mb-4 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-2 px-4 rounded-xl transition-all text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-eye"></i> Show Code (Dev Only)
                </button>

                <button type="button" id="verify-otp-btn"
                    class="w-full bg-red-600 hover:bg-red-700 active:scale-95 text-white font-bold py-3 rounded-xl transition-all text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-shield-halved"></i>
                    <span id="verify-label">Verify Code</span>
                    <i id="verify-spinner" class="fas fa-spinner fa-spin hidden"></i>
                </button>

                <p class="text-center text-xs text-gray-400 mt-4">
                    Didn't receive a code?
                    <a href="/forgot-password" class="text-red-600 font-semibold hover:underline">Send again</a>
                </p>
            </div>

            <!-- ── STEP 2: New password ───────────────────────────────── -->
            <div id="step-newpw" class="hidden space-y-4">

                <div>
                    <label for="new-password" class="block text-sm font-bold text-gray-700 mb-1">New Password</label>
                    <div class="relative">
                        <input type="password" id="new-password" placeholder="Min 6 characters"
                            class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50 pr-11">
                        <button type="button" id="toggle-pw1"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition">
                            <i class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
                    <!-- Strength bar -->
                    <div class="mt-2 h-1 bg-gray-100 rounded-full overflow-hidden">
                        <div id="strength-bar" class="strength-bar w-0 bg-gray-300"></div>
                    </div>
                    <p id="strength-label" class="text-xs text-gray-400 mt-1"></p>
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-bold text-gray-700 mb-1">Confirm New Password</label>
                    <div class="relative">
                        <input type="password" id="confirm-password" placeholder="Repeat your password"
                            class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50 pr-11">
                        <button type="button" id="toggle-pw2"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition">
                            <i class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
                    <p id="match-label" class="text-xs mt-1 hidden"></p>
                </div>

                <button type="button" id="reset-btn"
                    class="w-full bg-red-600 hover:bg-red-700 active:scale-95 text-white font-bold py-3 rounded-xl transition-all text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-key"></i>
                    <span id="reset-label">Set New Password</span>
                    <i id="reset-spinner" class="fas fa-spinner fa-spin hidden"></i>
                </button>
            </div>

        </div>

        <p class="text-center text-sm text-gray-400 mt-6">
            <a href="/login" class="text-red-600 font-bold hover:underline">
                <i class="fas fa-arrow-left mr-1 text-xs"></i>Back to Sign In
            </a>
        </p>
    </div>

<script>
    // ── State ───────────────────────────────────────────────────────────
    let verifiedEmail = '';
    let verifiedOtp   = '';

    // Pre-fill email from localStorage (set by forgot-password page)
    const savedEmail = localStorage.getItem('reset_email');
    if (savedEmail) {
        document.getElementById('email').value = savedEmail;
    }

    // ── Utilities ───────────────────────────────────────────────────────
    function showStatus(msg, isError = true) {
        const box  = document.getElementById('status-msg');
        const icon = document.getElementById('status-icon');
        const text = document.getElementById('status-text');
        text.textContent = msg;
        box.classList.remove('hidden', 'bg-red-50', 'border-red-200', 'text-red-700',
                             'bg-green-50', 'border-green-200', 'text-green-700');
        if (isError) {
            box.classList.add('flex', 'bg-red-50', 'border-red-200', 'text-red-700');
            icon.className = 'fas fa-circle-exclamation';
        } else {
            box.classList.add('flex', 'bg-green-50', 'border-green-200', 'text-green-700');
            icon.className = 'fas fa-circle-check';
        }
    }

    function hideStatus() {
        document.getElementById('status-msg').classList.add('hidden');
    }

    function getOtpValue() {
        return [...document.querySelectorAll('.otp-box')].map(b => b.value).join('');
    }

    // ── OTP box navigation ──────────────────────────────────────────────
    const otpBoxes = document.querySelectorAll('.otp-box');
    otpBoxes.forEach((box, i) => {
        box.addEventListener('input', () => {
            // Allow only digits
            box.value = box.value.replace(/\D/g, '').slice(-1);
            box.classList.toggle('filled', box.value !== '');
            if (box.value && i < otpBoxes.length - 1) {
                otpBoxes[i + 1].focus();
            }
        });
        box.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !box.value && i > 0) {
                otpBoxes[i - 1].focus();
            }
        });
        // Paste support: distribute pasted digits across boxes
        box.addEventListener('paste', (e) => {
            e.preventDefault();
            const digits = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
            [...digits].forEach((d, j) => {
                if (otpBoxes[i + j]) {
                    otpBoxes[i + j].value = d;
                    otpBoxes[i + j].classList.add('filled');
                }
            });
            const next = otpBoxes[Math.min(i + digits.length, otpBoxes.length - 1)];
            if (next) next.focus();
        });
    });

    // ── Dev: Show OTP button ────────────────────────────────────────────
    document.getElementById('show-otp-btn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        if (!email) { showStatus('Please enter your email first.'); return; }

        const btn = document.getElementById('show-otp-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Loading…';

        try {
            const res  = await fetch('/api/get_reset_otp', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email })
            });
            const data = await res.json();
            if (res.ok && data.otp) {
                const digits = data.otp.split('');
                digits.forEach((d, i) => {
                    if (otpBoxes[i]) {
                        otpBoxes[i].value = d;
                        otpBoxes[i].classList.add('filled');
                    }
                });
                showStatus(`Code loaded: ${data.otp}`, false);
            } else {
                showStatus(data.error || 'Could not retrieve code.');
            }
        } catch {
            showStatus('Connection error.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-eye mr-2"></i>Show Code (Dev Only)';
        }
    });

    // ── Step 1: Verify OTP ──────────────────────────────────────────────
    document.getElementById('verify-otp-btn').addEventListener('click', async () => {
        hideStatus();
        const email = document.getElementById('email').value.trim();
        const otp   = getOtpValue();

        if (!email) { showStatus('Please enter your email.'); return; }
        if (otp.length !== 6) { showStatus('Please enter all 6 digits.'); return; }

        const btn     = document.getElementById('verify-otp-btn');
        const label   = document.getElementById('verify-label');
        const spinner = document.getElementById('verify-spinner');
        btn.disabled = true;
        label.textContent = 'Verifying…';
        spinner.classList.remove('hidden');

        try {
            const res  = await fetch('/api/verify-reset-otp', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email, otp })
            });
            const data = await res.json();

            if (res.ok) {
                verifiedEmail = email;
                verifiedOtp   = otp;
                localStorage.removeItem('reset_email');
                showStatus('Code verified! Now set your new password.', false);
                // Transition to step 2
                setTimeout(() => {
                    hideStatus();
                    document.getElementById('step-otp').classList.add('hidden');
                    document.getElementById('step-newpw').classList.remove('hidden');
                    document.getElementById('step-desc').textContent = 'Choose a strong new password';
                    // Update step indicators
                    document.getElementById('step2-num').classList.replace('bg-gray-200', 'bg-red-600');
                    document.getElementById('step2-num').classList.replace('text-gray-500', 'text-white');
                    document.getElementById('step2-label').classList.replace('text-gray-400', 'text-red-600');
                    document.getElementById('new-password').focus();
                }, 800);
            } else {
                showStatus(data.error || 'Invalid or expired code.');
            }
        } catch {
            showStatus('Connection error — check your server.');
        } finally {
            btn.disabled = false;
            label.textContent = 'Verify Code';
            spinner.classList.add('hidden');
        }
    });

    // ── Password strength meter ─────────────────────────────────────────
    document.getElementById('new-password').addEventListener('input', () => {
        const pw  = document.getElementById('new-password').value;
        const bar = document.getElementById('strength-bar');
        const lbl = document.getElementById('strength-label');
        let score = 0;
        if (pw.length >= 6)  score++;
        if (pw.length >= 10) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        const levels = [
            { w: '0%',   bg: 'bg-gray-300', txt: '',            color: '' },
            { w: '25%',  bg: 'bg-red-500',  txt: 'Weak',        color: 'text-red-500' },
            { w: '50%',  bg: 'bg-orange-400', txt: 'Fair',      color: 'text-orange-500' },
            { w: '75%',  bg: 'bg-yellow-400', txt: 'Good',      color: 'text-yellow-600' },
            { w: '90%',  bg: 'bg-green-400', txt: 'Strong',     color: 'text-green-600' },
            { w: '100%', bg: 'bg-green-500', txt: 'Very Strong', color: 'text-green-700' },
        ];
        const lvl = levels[Math.min(score, 5)];
        bar.style.width = lvl.w;
        bar.className = `strength-bar ${lvl.bg}`;
        lbl.textContent = lvl.txt;
        lbl.className = `text-xs mt-1 ${lvl.color}`;
        checkMatch();
    });

    // ── Password match check ────────────────────────────────────────────
    function checkMatch() {
        const pw  = document.getElementById('new-password').value;
        const cpw = document.getElementById('confirm-password').value;
        const lbl = document.getElementById('match-label');
        if (!cpw) { lbl.classList.add('hidden'); return; }
        lbl.classList.remove('hidden');
        if (pw === cpw) {
            lbl.textContent = '✓ Passwords match';
            lbl.className = 'text-xs mt-1 text-green-600';
        } else {
            lbl.textContent = '✗ Passwords do not match';
            lbl.className = 'text-xs mt-1 text-red-500';
        }
    }
    document.getElementById('confirm-password').addEventListener('input', checkMatch);

    // ── Toggle password visibility ──────────────────────────────────────
    function togglePw(inputId, btnId) {
        document.getElementById(btnId).addEventListener('click', () => {
            const inp  = document.getElementById(inputId);
            const icon = document.querySelector(`#${btnId} i`);
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                inp.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    }
    togglePw('new-password', 'toggle-pw1');
    togglePw('confirm-password', 'toggle-pw2');

    // ── Step 2: Reset password ──────────────────────────────────────────
    document.getElementById('reset-btn').addEventListener('click', async () => {
        hideStatus();
        const pw  = document.getElementById('new-password').value;
        const cpw = document.getElementById('confirm-password').value;

        if (pw.length < 6)  { showStatus('Password must be at least 6 characters.'); return; }
        if (pw !== cpw)     { showStatus('Passwords do not match.'); return; }

        const btn     = document.getElementById('reset-btn');
        const label   = document.getElementById('reset-label');
        const spinner = document.getElementById('reset-spinner');
        btn.disabled = true;
        label.textContent = 'Saving…';
        spinner.classList.remove('hidden');

        try {
            const res  = await fetch('/api/reset-password', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email: verifiedEmail, otp: verifiedOtp, new_password: pw })
            });
            const data = await res.json();

            if (res.ok) {
                showStatus('Password reset successfully! Redirecting to login…', false);
                setTimeout(() => { window.location.href = '/login'; }, 2000);
            } else {
                showStatus(data.error || 'Failed to reset password. Please try again.');
                btn.disabled = false;
                label.textContent = 'Set New Password';
                spinner.classList.add('hidden');
            }
        } catch {
            showStatus('Connection error — check your server.');
            btn.disabled = false;
            label.textContent = 'Set New Password';
            spinner.classList.add('hidden');
        }
    });
</script>
</body>
</html>
