<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | MMU OSSD</title>
    <meta name="description" content="Reset your MMU OSSD account password">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-field { transition: border-color 0.2s, box-shadow 0.2s; }
        .input-field:focus { box-shadow: 0 0 0 3px rgba(220,38,38,0.12); }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .card { animation: fadeUp 0.4s ease both; }
        @keyframes pulse-ring {
            0%   { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
            70%  { transform: scale(1);    box-shadow: 0 0 0 12px rgba(220,38,38,0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220,38,38,0); }
        }
        .icon-pulse { animation: pulse-ring 2s ease infinite; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-red-50 flex items-center justify-center px-4">

    <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <a href="/" class="inline-block">
                <h1 class="text-4xl font-extrabold tracking-tight text-gray-900">
                    MMU <span class="font-light text-red-600">OSSD</span>
                </h1>
            </a>
            <p class="text-gray-400 text-sm mt-2">Open Source Student Directory</p>
        </div>

        <div class="card bg-white p-8 rounded-3xl shadow-xl border border-gray-100">

            <!-- Icon -->
            <div class="flex justify-center mb-6">
                <div class="icon-pulse w-16 h-16 bg-red-50 border-4 border-red-100 rounded-full flex items-center justify-center text-red-500 text-2xl">
                    <i class="fas fa-lock-open"></i>
                </div>
            </div>

            <h2 class="text-2xl font-black text-gray-900 mb-1 text-center">Forgot Password?</h2>
            <p class="text-gray-400 text-sm mb-6 text-center">Enter your MMU email and we'll send you a reset code</p>

            <!-- Status message -->
            <div id="status-msg" class="hidden items-center gap-3 border text-sm px-4 py-3 rounded-xl mb-5">
                <i id="status-icon" class="fas"></i>
                <span id="status-text"></span>
            </div>

            <form id="forgot-form" class="space-y-4" novalidate>
                <div>
                    <label for="email" class="block text-sm font-bold text-gray-700 mb-1">MMU Email Address</label>
                    <input type="email" id="email" name="email" required
                        placeholder="student@mmu.edu.my"
                        class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50">
                </div>

                <button type="submit" id="send-btn"
                    class="w-full bg-red-600 hover:bg-red-700 active:scale-95 text-white font-bold py-3 rounded-xl transition-all text-sm mt-2 flex items-center justify-center gap-2">
                    <i class="fas fa-paper-plane"></i>
                    <span id="btn-label">Send Reset Code</span>
                    <i id="btn-spinner" class="fas fa-spinner fa-spin hidden"></i>
                </button>
            </form>

            <p class="text-center text-sm text-gray-400 mt-6">
                Remembered your password?
                <a href="/login" class="text-red-600 font-bold hover:underline">Sign in</a>
            </p>
        </div>
    </div>

<script>
    function showStatus(msg, isError = true) {
        const box  = document.getElementById('status-msg');
        const icon = document.getElementById('status-icon');
        const text = document.getElementById('status-text');
        text.textContent = msg;
        box.classList.remove('hidden', 'bg-red-50', 'border-red-200', 'text-red-700',
                             'bg-green-50', 'border-green-200', 'text-green-700');
        if (isError) {
            box.classList.add('flex', 'bg-red-50', 'border-red-200', 'text-red-700');
            icon.className = 'fas fa-circle-exclamation';
        } else {
            box.classList.add('flex', 'bg-green-50', 'border-green-200', 'text-green-700');
            icon.className = 'fas fa-circle-check';
        }
    }

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn     = document.getElementById('send-btn');
        const label   = document.getElementById('btn-label');
        const spinner = document.getElementById('btn-spinner');
        const email   = document.getElementById('email').value.trim();

        document.getElementById('status-msg').classList.add('hidden');
        btn.disabled = true;
        label.textContent = 'Sending…';
        spinner.classList.remove('hidden');

        try {
            const res  = await fetch('/api/forgot-password', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email })
            });
            const data = await res.json();

            if (res.ok) {
                showStatus('Reset code sent! Check your email (or the terminal in dev mode).', false);
                // Store email so reset page can pre-fill it
                localStorage.setItem('reset_email', email);
                setTimeout(() => { window.location.href = '/reset-password'; }, 2000);
            } else {
                showStatus(data.error || 'Something went wrong. Please try again.');
                btn.disabled = false;
                label.textContent = 'Send Reset Code';
                spinner.classList.add('hidden');
            }
        } catch {
            showStatus('Connection error — is the server running?');
            btn.disabled = false;
            label.textContent = 'Send Reset Code';
            spinner.classList.add('hidden');
        }
    });
</script>
</body>
</html>
