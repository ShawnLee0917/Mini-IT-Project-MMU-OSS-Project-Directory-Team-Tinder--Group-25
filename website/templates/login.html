<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | MMU OSSD</title>
    <meta name="description" content="Sign in to MMU Open Source Student Directory">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-field {
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-field:focus {
            box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .card { animation: fadeUp 0.4s ease both; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-red-50 flex items-center justify-center px-4">

    <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <a href="/" class="inline-block">
                <h1 class="text-4xl font-extrabold tracking-tight text-gray-900">
                    MMU <span class="font-light text-red-600">OSSD</span>
                </h1>
            </a>
            <p class="text-gray-400 text-sm mt-2">Open Source Student Directory</p>
        </div>

        <div class="card bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <h2 class="text-2xl font-black text-gray-900 mb-1">Welcome back</h2>
            <p class="text-gray-400 text-sm mb-6">Sign in to your account to continue</p>

            <div id="error-msg" class="hidden items-center gap-3 bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl mb-5">
                <i class="fas fa-circle-exclamation flex-shrink-0"></i>
                <span id="error-text"></span>
            </div>

            <div id="success-msg" class="hidden items-center gap-3 bg-green-50 border border-green-200 text-green-700 text-sm px-4 py-3 rounded-xl mb-5">
                <i class="fas fa-check-circle flex-shrink-0"></i>
                <span id="success-text"></span>
            </div>

            <form id="login-form" class="space-y-4" novalidate>
                <div>
                    <label for="email" class="block text-sm font-bold text-gray-700 mb-1">Email address</label>
                    <input type="email" id="email" name="email" required
                        placeholder="student@mmu.edu.my"
                        class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label for="password" class="block text-sm font-bold text-gray-700">Password</label>
                        <button type="button" id="forgot-pw-btn" class="text-xs font-semibold text-red-600 hover:text-red-700 hover:underline focus:outline-none">
                            Forgot password?
                        </button>
                    </div>
                    
                    <div class="relative">
                        <input type="password" id="password" name="password" required
                            placeholder="••••••••"
                            class="input-field w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50 pr-11">
                        <button type="button" id="toggle-pw"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition">
                            <i class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <div class="text-right">
                    <a href="/forgot-password" class="text-xs text-red-500 hover:text-red-700 font-semibold hover:underline transition">
                        Forgot password?
                    </a>
                </div>

                <button type="submit" id="login-btn"
                    class="w-full bg-red-600 hover:bg-red-700 active:scale-95 text-white font-bold py-3 rounded-xl transition-all text-sm mt-2 flex items-center justify-center gap-2">
                    <span id="btn-label">Sign In</span>
                    <i id="btn-spinner" class="fas fa-spinner fa-spin hidden"></i>
                </button>
            </form>

            <div class="mt-4 text-center text-xs text-gray-400 bg-gray-50 rounded-xl py-3 px-4">
                <span class="font-semibold text-gray-500">Demo account:</span>
                student@mmu.edu.my &nbsp;/&nbsp; mmu1234
            </div>

            <p class="text-center text-sm text-gray-400 mt-6">
                Don't have an account?
                <a href="{{ url_for('views.register') }}" class="text-red-600 font-bold hover:underline">Register here</a>
            </p>
        </div>
    </div>

<script>
    const API = '/api';

    // Password Toggle
    document.getElementById('toggle-pw').addEventListener('click', () => {
        const pw = document.getElementById('password');
        const icon = document.querySelector('#toggle-pw i');
        if (pw.type === 'password') {
            pw.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            pw.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    });

    // Helper to show errors
    function showError(msg, isHtml = false) {
        document.getElementById('success-msg').classList.add('hidden'); // Hide success if showing
        const box = document.getElementById('error-msg');
        const textEl = document.getElementById('error-text');
        
        if (isHtml) {
            textEl.innerHTML = msg; 
        } else {
            textEl.textContent = msg; 
        }
        
        box.classList.remove('hidden');
        box.classList.add('flex');
    }

    // Helper to show success
    function showSuccess(msg) {
        document.getElementById('error-msg').classList.add('hidden'); // Hide error if showing
        const box = document.getElementById('success-msg');
        document.getElementById('success-text').textContent = msg;
        
        box.classList.remove('hidden');
        box.classList.add('flex');
    }

    // Forgot Password Logic
    document.getElementById('forgot-pw-btn').addEventListener('click', async (e) => {
        e.preventDefault();
        const emailInput = document.getElementById('email').value.trim();
        
        if (!emailInput) {
            showError('Please enter your email address first to reset your password.');
            document.getElementById('email').focus();
            return;
        }

        const btn = document.getElementById('forgot-pw-btn');
        const originalText = btn.textContent;
        btn.textContent = 'Sending...';
        btn.disabled = true;
        btn.classList.add('opacity-50', 'cursor-not-allowed');

        try {
            const res = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailInput })
            });
            const data = await res.json();
            
            if (res.ok) {
                showSuccess('A verification token has been sent to your email. Redirecting...');
                setTimeout(() => {
                    window.location.href = '/verify';
                }, 2000);
            } else {
                showError(data.error || 'Failed to initialize password reset.');
            }
        } catch {
            showError('Connection error. Is the server running?');
        } finally {
            btn.textContent = originalText;
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    });

    // Standard Login Logic
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn     = document.getElementById('login-btn');
        const label   = document.getElementById('btn-label');
        const spinner = document.getElementById('btn-spinner');

        document.getElementById('error-msg').classList.add('hidden');
        document.getElementById('success-msg').classList.add('hidden');
        
        btn.disabled = true;
        label.textContent = 'Signing in…';
        spinner.classList.remove('hidden');

        try {
            const res = await fetch('/api/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include', 
                body:    JSON.stringify({
                    email:    document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value,
                })
            });
            const data = await res.json();
            
            if (res.ok) {
                window.location.href = '/'; 
            } else {
                if (res.status === 403 && data.error.includes('verify')) {
                    showError(`${data.error} <a href="/verify" class="underline font-semibold hover:text-red-800">Go to verification →</a>`, true);
                } else {
                    showError(data.error || 'Login failed. Please try again.');
                }
            }
        } catch {
            showError('Connection error — is the Flask server running?');
        } finally {
            btn.disabled = false;
            label.textContent = 'Sign In';
            spinner.classList.add('hidden');
        }
    });

    // --- FORCE REDIRECT FORGOT PASSWORD TO NEW HTML PAGE ---
    const forgotPasswordButton = document.getElementById('forgot-pw-btn');
    if (forgotPasswordButton) {
        const cleanButton = forgotPasswordButton.cloneNode(true);
        forgotPasswordButton.parentNode.replaceChild(cleanButton, forgotPasswordButton);
        
        cleanButton.addEventListener('click', (e) => {
            e.preventDefault();
            // 💡 核心修改：利用 Flask 后端动态渲染出带 Blueprint 前缀的绝对正确路径！
            window.location.href = "{{ url_for('views.forgot_password_page') }}";
        });
    }
</script>
</body>
</html>
