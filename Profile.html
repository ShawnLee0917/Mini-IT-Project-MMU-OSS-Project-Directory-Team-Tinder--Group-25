<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | MMU OSSD</title>
    <meta name="description" content="Your MMU Open Source Student Directory profile">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        #avatar-wrapper:hover #avatar-overlay {
            opacity: 1;
        }

        #avatar-overlay {
            transition: opacity 0.2s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.35s ease both;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900">

    <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
    <nav class="bg-red-700 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="menu-btn" class="text-white focus:outline-none p-1 hover:bg-red-800 rounded transition">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <a href="Navigation.html" class="hover:opacity-80 transition flex items-center gap-4">
                    <i class="fas fa-arrow-left text-xl"></i>
                    <h1 class="text-2xl font-extrabold tracking-tighter">
                        MMU <span class="font-light text-red-200">OSSD</span>
                    </h1>
                </a>
            </div>
            <div class="flex space-x-6 items-center font-medium">
                <a href="Navigation.html" class="hover:text-red-200 transition text-sm hidden md:block">Home</a>
                <a href="Search.html" class="hover:text-red-200 transition text-sm hidden md:block">Search</a>
                <a href="My_Projects.html" class="hover:text-red-200 transition text-sm hidden md:block">My Projects</a>
                <div class="bg-red-900 px-4 py-2 rounded-full flex items-center space-x-2 border border-red-400">
                    <span id="nav-email" class="text-sm hidden md:inline">…</span>
                    <i class="fas fa-user-circle text-lg text-red-200"></i>
                </div>
                <button id="logout-btn"
                    class="bg-white text-red-700 hover:bg-red-50 text-xs font-bold px-3 py-2 rounded-xl transition">
                    <i class="fas fa-sign-out-alt mr-1"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- ── Main ────────────────────────────────────────────────────────────── -->
    <main class="container mx-auto px-6 py-12 fade-in">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">

            <!-- Left column -->
            <div class="space-y-6">

                <!-- Profile card -->
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 text-center">

                    <!-- Avatar with upload overlay -->
                    <div id="avatar-wrapper" class="relative w-24 h-24 mx-auto mb-4 cursor-pointer"
                        title="Click to change photo">
                        <div id="avatar-initials"
                            class="w-24 h-24 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-3xl font-black">
                            <i class="fas fa-spinner fa-spin text-2xl"></i>
                        </div>
                        <img id="avatar-img" src="" alt="Profile photo"
                            class="hidden w-24 h-24 rounded-full object-cover absolute inset-0">
                        <!-- Hover overlay -->
                        <div id="avatar-overlay"
                            class="absolute inset-0 bg-black bg-opacity-40 rounded-full flex items-center justify-center opacity-0">
                            <i class="fas fa-camera text-white text-xl"></i>
                        </div>
                        <input type="file" id="avatar-input" accept="image/png,image/jpeg,image/gif,image/webp"
                            class="hidden">
                    </div>

                    <h2 id="display-name" class="text-2xl font-black">Loading…</h2>
                    <p id="display-faculty" class="text-gray-400 text-sm">…</p>

                    <!-- Bio -->
                    <p id="display-bio" class="text-gray-500 text-sm mt-3 italic hidden"></p>

                    <div class="mt-6 pt-6 border-t border-gray-50 grid grid-cols-2 gap-4">
                        <div>
                            <p id="display-rank" class="text-xl font-black text-red-600">–</p>
                            <p class="text-[10px] uppercase font-bold text-gray-400">Rank</p>
                        </div>
                        <div>
                            <p id="display-karma" class="text-xl font-black text-red-600">–</p>
                            <p class="text-[10px] uppercase font-bold text-gray-400">Karma</p>
                        </div>
                    </div>

                    <button id="open-edit-modal-btn"
                        class="mt-6 w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-2 rounded-xl border border-gray-200 transition text-sm">
                        <i class="fas fa-pen mr-1"></i> Edit Profile
                    </button>
                </div>

                <!-- Badges -->
                <div class="bg-gray-900 p-6 rounded-3xl text-white">
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Badges</h3>
                    <div class="flex gap-3">
                        <i class="fas fa-fire-alt text-orange-400 text-2xl" title="Early Adopter"></i>
                        <i class="fas fa-code text-blue-400 text-2xl" title="Python Expert"></i>
                        <i class="fas fa-handshake text-green-400 text-2xl" title="Top Contributor"></i>
                    </div>
                </div>
            </div>

            <!-- Right column -->
            <div class="lg:col-span-2 space-y-8">

                <!-- Skills -->
                <section class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Skills &amp; Tech Stack
                    </h3>
                    <div id="display-skills" class="flex flex-wrap gap-2">
                        <span
                            class="bg-gray-100 px-4 py-2 rounded-xl text-sm font-semibold text-gray-400 italic">Loading…</span>
                    </div>
                </section>

                <!-- My Projects -->
                <section class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">My Projects</h3>
                    <div id="projects-list" class="space-y-4">
                        <div class="p-4 bg-gray-50 text-gray-400 rounded-2xl text-center text-sm italic">
                            Loading projects…
                        </div>
                    </div>
                    <button id="add-project-btn"
                        class="mt-4 w-full p-4 border border-dashed border-gray-200 rounded-2xl text-center text-gray-400 text-sm hover:bg-gray-50 transition cursor-pointer">
                        <i class="fas fa-plus mr-1"></i>List another project for handover
                    </button>
                </section>
            </div>
        </div>
    </main>

    <!-- ── Toast ───────────────────────────────────────────────────────────── -->
    <div id="toast"
        class="hidden fixed bottom-6 right-6 z-[70] px-6 py-3 rounded-2xl text-white text-sm font-semibold shadow-lg transition-all duration-300">
    </div>

    <!-- ── Add Project Modal ───────────────────────────────────────────────── -->
    <div id="add-project-modal"
        class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center px-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">List Your Project</h2>
                <a href="/List_Your_Project.html" id="close-project-modal-btn" class="text-gray-400 hover:text-gray-700 transition">
                    <i class="fas fa-times text-xl"></i>
                </a>
            </div>
            <form id="add-project-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Project Name</label>
                    <input type="text" id="project-name" placeholder="e.g. Smart Parking System"
                        class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Description</label>
                    <textarea id="project-desc" rows="3" placeholder="Tell others about your project…"
                        class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50 resize-none"></textarea>
                </div>
                <div class="pt-2 flex justify-end gap-3">
                    <button type="button" id="cancel-project-btn"
                        class="px-5 py-2 rounded-xl border border-gray-200 text-sm font-bold text-gray-600 hover:bg-gray-50 transition">Cancel</button>
                    <button type="submit" id="create-project-btn"
                        class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-xl font-bold transition text-sm flex items-center gap-2">
                        <span id="create-label">Create Project</span>
                        <i id="create-spinner" class="fas fa-spinner fa-spin hidden"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ── Edit Profile Modal ──────────────────────────────────────────────── -->
    <div id="edit-profile-modal"
        class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center px-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Edit Profile</h2>
                <button id="close-modal-btn" class="text-gray-400 hover:text-gray-700 transition">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="edit-profile-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Name</label>
                    <input type="text" id="edit-name"
                        class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Faculty</label>
                    <input type="text" id="edit-faculty"
                        class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Bio</label>
                    <textarea id="edit-bio" rows="3" placeholder="Tell others a bit about yourself…"
                        class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50 resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Skills &amp; Languages <span
                            class="text-gray-400 font-normal">(comma separated)</span></label>
                    <input type="text" id="edit-skills" placeholder="e.g. Python, JavaScript, React"
                        class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:border-red-500 text-sm bg-gray-50">
                </div>
                <div class="pt-2 flex justify-end gap-3">
                    <button type="button" id="cancel-edit-btn"
                        class="px-5 py-2 rounded-xl border border-gray-200 text-sm font-bold text-gray-600 hover:bg-gray-50 transition">Cancel</button>
                    <button type="submit" id="save-btn"
                        class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-xl font-bold transition text-sm flex items-center gap-2">
                        <span id="save-label">Save Changes</span>
                        <i id="save-spinner" class="fas fa-spinner fa-spin hidden"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = '/api';
        const IS_FILE = window.location.protocol === 'file:';
        const STORAGE_KEY = 'mmu_ossd_profile';
        const DEFAULT_PROFILE = {
            name: 'MMU Student', faculty: 'Faculty of Computing & Informatics',
            bio: '', skills: ['Python', 'Flask', 'Tailwind CSS', 'SQLite'],
            avatar: '', rank: 12, karma: 450,
        };

        // Fix nav links in file:// mode
        if (IS_FILE) {
            document.querySelectorAll('a[href="/home"]').forEach(a => a.setAttribute('href', 'Navigation.html'));
            document.querySelectorAll('a[href="/profile"]').forEach(a => a.setAttribute('href', 'Profile.html'));
            document.querySelectorAll('a[href="/login"]').forEach(a => a.setAttribute('href', 'login.html'));
        }

        // ── Helpers ─────────────────────────────────────────────────────────────────
        let toastTimer;
        function showToast(msg, success = true) {
            clearTimeout(toastTimer);
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `fixed bottom-6 right-6 z-[70] px-6 py-3 rounded-2xl text-white text-sm
                   font-semibold shadow-lg transition-all duration-300
                   ${success ? 'bg-green-600' : 'bg-red-600'}`;
            toastTimer = setTimeout(() => t.classList.add('hidden'), 3500);
        }

        function renderSkills(skills) {
            const el = document.getElementById('display-skills');
            el.innerHTML = '';
            (skills.length ? skills : ['No skills listed']).forEach(s => {
                const span = document.createElement('span');
                span.className = 'bg-gray-100 px-4 py-2 rounded-xl text-sm font-semibold text-gray-700';
                span.textContent = s;
                el.appendChild(span);
            });
        }

        function setAvatar(name, avatarData) {
            const initials = document.getElementById('avatar-initials');
            const img = document.getElementById('avatar-img');
            if (avatarData) {
                img.src = avatarData;
                img.classList.remove('hidden');
                initials.classList.add('hidden');
            } else {
                initials.textContent = (name || 'S')[0].toUpperCase();
                initials.classList.remove('hidden');
                img.classList.add('hidden');
            }
        }

        function setBio(bio) {
            const el = document.getElementById('display-bio');
            if (bio && bio.trim()) {
                el.textContent = bio;
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        }

        function getLocalProfile() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : { ...DEFAULT_PROFILE };
        }
        function saveLocalProfile(patch) {
            const p = { ...getLocalProfile(), ...patch };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
            return p;
        }

        // ── Auth check (skipped in file:// mode) ─────────────────────────────────────
        async function checkAuth() {
            if (IS_FILE) {
                document.getElementById('nav-email').textContent = '(offline)';
                return true;
            }
            try {
                const res = await fetch(`${API}/me`);
                if (!res.ok) { window.location.href = '/login'; return false; }
                const data = await res.json();
                if (!data.loggedIn) { window.location.href = '/login'; return false; }
                document.getElementById('nav-email').textContent = data.email;
                return true;
            } catch {
                window.location.href = '/login';
                return false;
            }
        }

        // ── Load profile ─────────────────────────────────────────────────────────────
        async function loadProfile() {
            let d;
            if (IS_FILE) {
                d = getLocalProfile();
                d.avatar_url = d.avatar || '';
            } else {
                try {
                    const res = await fetch(`${API}/profile`);
                    if (res.status === 401) { window.location.href = 'login.html'; return; }
                    if (!res.ok) throw new Error();
                    d = await res.json();
                } catch {
                    showToast('Could not load profile — is the server running?', false);
                    setAvatar('S', '');
                    renderSkills([]);
                    return;
                }
            }
            document.getElementById('display-name').textContent = d.name;
            document.getElementById('display-faculty').textContent = d.faculty;
            document.getElementById('display-rank').textContent = d.rank;
            document.getElementById('display-karma').textContent = d.karma;
            setBio(d.bio);
            setAvatar(d.name, d.avatar_url || d.avatar || '');
            renderSkills(d.skills);
            document.getElementById('edit-name').value = d.name;
            document.getElementById('edit-faculty').value = d.faculty;
            document.getElementById('edit-bio').value = d.bio || '';
            document.getElementById('edit-skills').value = d.skills.join(', ');
        }

        // ── Save profile ─────────────────────────────────────────────────────────────
        async function saveProfile(name, faculty, bio, skills) {
            const saveBtn = document.getElementById('save-btn');
            const label = document.getElementById('save-label');
            const spinner = document.getElementById('save-spinner');
            saveBtn.disabled = true;
            label.textContent = 'Saving\u2026';
            spinner.classList.remove('hidden');

            try {
                if (IS_FILE) {
                    saveLocalProfile({ name, faculty, bio, skills });
                } else {
                    const res = await fetch(`${API}/profile`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, faculty, bio, skills }),
                    });
                    if (!res.ok) throw new Error();
                }
                document.getElementById('display-name').textContent = name;
                document.getElementById('display-faculty').textContent = faculty;
                setBio(bio);
                const currentAvatar = document.getElementById('avatar-img').classList.contains('hidden')
                    ? '' : document.getElementById('avatar-img').src;
                setAvatar(name, currentAvatar);
                renderSkills(skills);
                document.getElementById('edit-profile-modal').classList.add('hidden');
                showToast('Profile saved \u2713');
            } catch {
                showToast('Failed to save', false);
            } finally {
                saveBtn.disabled = false;
                label.textContent = 'Save Changes';
                spinner.classList.add('hidden');
            }
        }

        // ── Avatar upload ─────────────────────────────────────────────────────────────
        async function uploadAvatar(file) {
            showToast('Uploading photo\u2026', true);
            if (IS_FILE) {
                // Store as base64 in localStorage — no server needed
                const reader = new FileReader();
                reader.onload = e => {
                    const b64 = e.target.result;
                    saveLocalProfile({ avatar: b64 });
                    const img = document.getElementById('avatar-img');
                    img.src = b64;
                    img.classList.remove('hidden');
                    document.getElementById('avatar-initials').classList.add('hidden');
                    showToast('Photo updated \u2713');
                };
                reader.readAsDataURL(file);
                return;
            }
            const form = new FormData();
            form.append('avatar', file);
            try {
                const res = await fetch(`${API}/profile/avatar`, { method: 'POST', body: form });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                const img = document.getElementById('avatar-img');
                img.src = data.avatar_url + '?t=' + Date.now();
                img.classList.remove('hidden');
                document.getElementById('avatar-initials').classList.add('hidden');
                showToast('Photo updated \u2713');
            } catch (err) {
                showToast(err.message || 'Upload failed', false);
            }
        }

        // ── Logout ────────────────────────────────────────────────────────────────────
        async function logout() {
            if (IS_FILE) { showToast('Offline mode — no logout needed'); return; }
            await fetch(`${API}/logout`, { method: 'POST' });
            window.location.href = '/login';
        }

        // ── Load projects ────────────────────────────────────────────────────────────
        async function loadProjects() {
            if (IS_FILE) {
                document.getElementById('projects-list').innerHTML = `
                    <div class="flex items-center justify-between p-4 border border-gray-50 rounded-2xl hover:bg-gray-50 transition">
                        <div>
                            <h4 class="font-bold text-gray-800">Sample Project</h4>
                            <p class="text-xs text-gray-400">Active • 1 Contributors</p>
                        </div>
                        <i class="fas fa-chevron-right text-gray-300"></i>
                    </div>
                `;
                return;
            }
            try {
                const res = await fetch(`${API}/projects`);
                if (!res.ok) throw new Error();
                const projects = await res.json();
                renderProjects(projects);
            } catch (err) {
                console.error('Failed to load projects:', err);
                showToast('Could not load projects', false);
            }
        }

        function renderProjects(projects) {
            const list = document.getElementById('projects-list');
            if (!projects.length) {
                list.innerHTML = `<div class="text-gray-400 text-sm italic text-center py-4">No projects yet. Create one to get started!</div>`;
                return;
            }
            list.innerHTML = projects.map(p => `
                <div class="flex items-center justify-between p-4 border border-gray-50 rounded-2xl hover:bg-gray-50 transition cursor-pointer">
                    <div>
                        <h4 class="font-bold text-gray-800">${escapeHtml(p.name)}</h4>
                        <p class="text-xs text-gray-400">${p.status} • ${p.contributors} Contributors</p>
                    </div>
                    <i class="fas fa-chevron-right text-gray-300"></i>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ── Create project ──────────────────────────────────────────────────────────
        async function createProject(name, description) {
            const btn = document.getElementById('create-project-btn');
            const label = document.getElementById('create-label');
            const spinner = document.getElementById('create-spinner');
            btn.disabled = true;
            label.textContent = 'Creating…';
            spinner.classList.remove('hidden');

            try {
                if (IS_FILE) {
                    showToast('Offline mode — project not saved', false);
                    return;
                }
                const res = await fetch(`${API}/projects`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description }),
                });
                if (!res.ok) throw new Error();
                document.getElementById('add-project-modal').classList.add('hidden');
                document.getElementById('project-name').value = '';
                document.getElementById('project-desc').value = '';
                await loadProjects();
                showToast('Project created ✓');
            } catch (err) {
                showToast('Failed to create project', false);
                console.error('Create project error:', err);
            } finally {
                btn.disabled = false;
                label.textContent = 'Create Project';
                spinner.classList.add('hidden');
            }
        }
        // ── Logout ────────────────────────────────────────────────────────────────────
        async function logout() {
            if (IS_FILE) { showToast('Offline mode — no logout needed'); return; }
            await fetch(`${API}/logout`, { method: 'POST' });
            window.location.href = '/login';
        }

        // ── Event wiring ─────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            const authed = await checkAuth();
            if (!authed) return;
            await loadProfile();
            await loadProjects();

            const modal = document.getElementById('edit-profile-modal');
            const projectModal = document.getElementById('add-project-modal');
            
            document.getElementById('open-edit-modal-btn').addEventListener('click', () => modal.classList.remove('hidden'));
            document.getElementById('close-modal-btn').addEventListener('click', () => modal.classList.add('hidden'));
            document.getElementById('cancel-edit-btn').addEventListener('click', () => modal.classList.add('hidden'));
            modal.addEventListener('click', e => { if (e.target === modal) modal.classList.add('hidden'); });

            document.getElementById('add-project-btn').addEventListener('click', () => projectModal.classList.remove('hidden'));
            document.getElementById('close-project-modal-btn').addEventListener('click', () => projectModal.classList.add('hidden'));
            document.getElementById('cancel-project-btn').addEventListener('click', () => projectModal.classList.add('hidden'));
            projectModal.addEventListener('click', e => { if (e.target === projectModal) projectModal.classList.add('hidden'); });

            document.getElementById('edit-profile-form').addEventListener('submit', e => {
                e.preventDefault();
                const name = document.getElementById('edit-name').value.trim();
                const faculty = document.getElementById('edit-faculty').value.trim();
                const bio = document.getElementById('edit-bio').value.trim();
                const skills = document.getElementById('edit-skills').value
                    .split(',').map(s => s.trim()).filter(Boolean);
                saveProfile(name, faculty, bio, skills);
            });

            document.getElementById('add-project-form').addEventListener('submit', e => {
                e.preventDefault();
                const name = document.getElementById('project-name').value.trim();
                const description = document.getElementById('project-desc').value.trim();
                if (!name) {
                    showToast('Project name is required', false);
                    return;
                }
                createProject(name, description);
            });

            document.getElementById('avatar-wrapper').addEventListener('click', () =>
                document.getElementById('avatar-input').click()
            );
            document.getElementById('avatar-input').addEventListener('change', e => {
                const file = e.target.files[0];
                if (file) uploadAvatar(file);
            });

            document.getElementById('logout-btn').addEventListener('click', logout);
        });
    </script>
</body>
</html>
